name: Deploy to Firebase Hosting on PR

on: 
  pull_request

permissions:
  checks: write
  contents: read
  pull-requests: write

env:
  NEXT_PUBLIC_TINA_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_TINA_CLIENT_ID }}
  NEXT_PUBLIC_TINA_TOKEN: ${{ secrets.NEXT_PUBLIC_TINA_TOKEN }}

jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Create .env.local file
        run: |
          # Branch name detection (PR vs push)
          BRANCH_NAME="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"

          echo "NEXT_PUBLIC_TINA_CLIENT_ID=${{ secrets.NEXT_PUBLIC_TINA_CLIENT_ID }}" >> .env.local
          echo "NEXT_PUBLIC_TINA_TOKEN=${{ secrets.NEXT_PUBLIC_TINA_TOKEN }}" >> .env.local
          echo "NEXT_PUBLIC_TINA_BRANCH=$BRANCH_NAME" >> .env.local

          echo "Deploying branch: $BRANCH_NAME"

      - name: (Optional) Debug .env.local
        run: cat .env.local

      - name: Build project
        run: npm run build

      - name: Deploy preview to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JUKEBOX }}
          projectId: shoutcast-web3
